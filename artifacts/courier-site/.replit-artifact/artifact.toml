kind = "web"
previewPath = "/"
title = "Courier & Logistics Website"
version = "1.0.0"
id = "artifacts/courier-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23752

[services.development]
run = "pnpm --filter @workspace/courier-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/courier-site", "run", "build" ]
publicDir = "artifacts/courier-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23752"
BASE_PATH = "/"
